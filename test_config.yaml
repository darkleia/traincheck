cluster:
  nodes: 64
  gpus_per_node: 8
  gpu_type: A100-SXM4-80GB
  interconnect: InfiniBand

nccl:
  version: "2.19.0"
  algo: Ring

parallelism:
  tensor_parallel: 2
  pipeline_parallel: 4
  data_parallel: 64

environment:
  NCCL_IB_DISABLE: 1

model:
  size_billion_params: 70

data:
  dataloader_workers: 2

checkpoint:
  frequency_steps: 5000