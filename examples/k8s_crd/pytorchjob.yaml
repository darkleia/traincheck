apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: llm-train
  namespace: ml-team
spec:
  elasticPolicy:
    minReplicas: 1
    maxReplicas: 8
    maxRestarts: 3
    rdzvBackend: c10d
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          schedulerName: volcano
          nodeSelector:
            gpu-type: h100
          volumes:
            - name: model-config
              configMap:
                name: model-config
          containers:
            - name: pytorch
              image: nvcr.io/nvidia/pytorch:24.01-py3
              command:
                - torchrun
                - --nnodes=8
                - --nproc-per-node=8
                - train.py
                - --deepspeed
                - ds_config.json
              env:
                - name: NCCL_ALGO
                  value: Ring
                - name: NCCL_IB_DISABLE
                  value: "0"
              envFrom:
                - configMapRef:
                    name: nccl-tuning
              volumeMounts:
                - name: model-config
                  mountPath: /config
              resources:
                limits:
                  nvidia.com/gpu: 8
                  cpu: "96"
                  memory: 1024Gi
    Worker:
      replicas: 7
      restartPolicy: OnFailure
      template:
        spec:
          schedulerName: volcano
          nodeSelector:
            gpu-type: h100
          volumes:
            - name: model-config
              configMap:
                name: model-config
          containers:
            - name: pytorch
              image: nvcr.io/nvidia/pytorch:24.01-py3
              command:
                - torchrun
                - --nnodes=8
                - --nproc-per-node=8
                - train.py
                - --deepspeed
                - ds_config.json
              env:
                - name: NCCL_ALGO
                  value: Ring
                - name: NCCL_IB_DISABLE
                  value: "0"
              envFrom:
                - configMapRef:
                    name: nccl-tuning
              volumeMounts:
                - name: model-config
                  mountPath: /config
              resources:
                limits:
                  nvidia.com/gpu: 8
                  cpu: "96"
                  memory: 1024Gi
